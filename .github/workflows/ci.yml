name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 go build -o flang .

      - name: Check example files
        run: |
          for fg in $(find demo -name inicio.fg -type f); do
            echo "Checking $fg ..."
            ./flang check "$fg"
          done
